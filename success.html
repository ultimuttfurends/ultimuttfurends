<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UltiMutt Furends | Pet Care</title>
  <link rel="shortcut icon" href="./favicon.ico?v=59" />
  <link rel="icon" href="./favicon.ico?v=59" sizes="any" />
  <link rel="icon" type="image/png" href="./favicon.png?v=59" />
  <link rel="apple-touch-icon" href="./favicon.png?v=59" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Quicksand:wght@300;400;500;600;700&family=Sacramento&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css?v=59" />
  <style>
    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:28px;
      text-align:center;
      background:var(--cream);
    }
    .success-card{
      width:min(680px,92vw);
      background:var(--white);
      border:1px solid var(--line);
      border-radius:34px;
      padding:clamp(30px,5vw,48px);
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }
    .success-card img{
      width:120px;
      margin:0 auto 20px;
      display:block;
    }
    .success-card .eyebrow{
      margin:0 auto 14px;
      text-align:center;
    }
    .success-card h1{
      font-family:'DM Serif Display',serif;
      font-size:clamp(2rem,3.4vw,2.85rem);
      line-height:1;
      margin:0 auto 18px;
      color:var(--brown);
      text-align:center;
      max-width:560px;
    }
    .success-card p{
      max-width:520px;
      margin:0 auto;
      color:#5a5050;
      font-size:1rem;
      text-align:center;
    }
    .success-card .btn{
      margin-top:26px;
    }
  </style>
<style>
/* v44 hero badge tweak */
.hero-badge,
.hero-image .hero-badge,
.hero-card .hero-badge,
.image-badge,
.best-furend-badge{
  width:280px !important;
  max-width:280px !important;
  right:8px !important;
  bottom:8px !important;
  padding:10px 20px !important;
}
.hero-badge *,
.hero-image .hero-badge *,
.hero-card .hero-badge *,
.image-badge *,
.best-furend-badge *{
  font-size:0.88em !important;
}
</style><style>
/* V54 Brittany Signature preview */
@import url('https://fonts.cdnfonts.com/css/brittany-signature');

.hero-badge,
.hero-image .hero-badge,
.hero-card .hero-badge,
.image-badge,
.best-furend-badge,
.hero-badge *,
.hero-image .hero-badge *,
.hero-card .hero-badge *,
.image-badge *,
.best-furend-badge *{
  font-family:'Brittany Signature', cursive !important;
  font-weight:400 !important;
  letter-spacing:.01em !important;
  line-height:1 !important;
}

.polaroid figcaption,
.polaroid-name,
.pet-name,
.gallery-name,
.photo-name,
.polaroid-caption,
.pet-card-name,
.gallery-card figcaption,
.pet-gallery figcaption,
.polaroid-card figcaption{
  font-family:'Brittany Signature', cursive !important;
  font-weight:400 !important;
  letter-spacing:.01em !important;
}
</style>
<style>
/* V55 hero badge width fix */
.hero-badge,
.image-badge,
.best-furend-badge{
  min-width: 680px !important;
  width: auto !important;
  padding: 22px 60px !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  text-align:center !important;
  white-space:nowrap !important;
  overflow:visible !important;
}
</style><style>
/* V57 compact hero badge final fix */
.hero-banner{
  overflow:visible !important;
}
.hero-badge{
  position:absolute !important;
  right:10px !important;
  bottom:10px !important;
  top:auto !important;
  left:auto !important;

  width:max-content !important;
  min-width:0 !important;
  max-width:calc(100% - 24px) !important;

  padding:8px 18px !important;
  border-radius:999px !important;
  box-sizing:border-box !important;

  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  text-align:center !important;
  white-space:nowrap !important;
  overflow:visible !important;

  font-family:'Brittany Signature', cursive !important;
  font-size:clamp(1.35rem,1.75vw,1.8rem) !important;
  line-height:1.05 !important;
  letter-spacing:.01em !important;

  transform:rotate(-7deg) !important;
  z-index:10 !important;
}

.hero-badge *{
  font-family:'Brittany Signature', cursive !important;
  font-size:inherit !important;
  line-height:1.05 !important;
  margin:0 !important;
  padding:0 !important;
  text-align:center !important;
  white-space:nowrap !important;
}

@media(max-width:700px){
  .hero-badge{
    right:8px !important;
    bottom:8px !important;
    padding:7px 14px !important;
    font-size:1.25rem !important;
    transform:rotate(-6deg) !important;
    max-width:calc(100% - 20px) !important;
  }
}
</style>
<style>
/* V59 actual pet-name font size fix */
.polaroid figcaption,
.polaroid .polaroid-name,
.polaroid-name,
.pet-name,
.gallery-name,
.photo-name,
.polaroid-caption,
.pet-card-name,
.gallery-card figcaption,
.pet-gallery figcaption,
.polaroid-card figcaption,
.gallery-polaroid figcaption,
.gallery-item figcaption,
.polaroid span,
.polaroid p.name,
.polaroid .name{
  font-size: clamp(1.15rem, 1.55vw, 1.55rem) !important;
  line-height: 1.05 !important;
}

/* Keep mobile pet names smaller too */
@media(max-width:700px){
  .polaroid figcaption,
  .polaroid .polaroid-name,
  .polaroid-name,
  .pet-name,
  .gallery-name,
  .photo-name,
  .polaroid-caption,
  .pet-card-name,
  .gallery-card figcaption,
  .pet-gallery figcaption,
  .polaroid-card figcaption,
  .gallery-polaroid figcaption,
  .gallery-item figcaption,
  .polaroid span,
  .polaroid p.name,
  .polaroid .name{
    font-size: 1.15rem !important;
  }
}
</style>
</head>
<body>
  <main class="success-card">
    <img src="./logo.png" alt="UltiMutt Furends logo">
    <p class="eyebrow">Request Received</p>
    <h1>Thank you, Furend!</h1>
    <p>Your booking request has been received. I’ll be in touch soon to discuss your pup’s needs, answer any questions, and confirm availability.</p>
    <a class="btn primary" href="/">Back to Home</a>
  </main>
</body>
</html>
